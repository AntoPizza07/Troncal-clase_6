<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Un fetch</title>
        <style>
            body {
                font-family: Helvetica, Arial, sans-serif;
                color: red
            }
            table {
            	border-collapse: collapse;
            	text-aling:left;
            }
            
            td, th {
            	border:1px solid red;
            	padding:1rem
            }
        </style>
    </head>
    <body>
        <h1>── ⋆⋅𖤓⋅⋆ ──₍^. .^₎⟆── ⋆⋅𖤓⋅⋆ ──</h1>
        <ol id="estudiantes"></ol>
        <table>
        	<thead></thead>
        	<th>Asignatura</th>
        	<th>Grupo</th>
        	<th>Enfoque</th>
        <tbody></tbody>
        	</table>
        	
        <script>
        	const t = document.querySelector("tbody");
        	
            const URL = "https://api.myjson.online/v1/records/22914ced-1adc-4b30-91a5-0ec8facc8a3f";
           fetch(URL)
    .then((respuesta) => {
        if (!respuesta.ok) {
            throw new Error("Error HTTP: " + respuesta.status);
        }
        return respuesta.json();
    })
    .then((datos) => {
        var trabajo = datos.data;
        console.log("Datos recibidos:", trabajo);
        trabajo.forEach((x) => {
            if (x.ok == 1) {
                t.innerHTML += `<tr><td>${x.name}</td><td>${x.group}</td><td>${x.focus}</td></tr>`;
            }
        });
    })
    .catch((error) => {
        console.error("Algo salió mal:", error);
    });
        </script>
    </body>
</html>
